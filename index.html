<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schedule</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f3;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b96;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --radius: 10px;
    --radius-sm: 6px;

    --her-bg: #e1f5ee;
    --her-text: #085041;
    --her-border: #9fe1cb;
    --him-bg: #e6f1fb;
    --him-text: #0c447c;
    --him-border: #b5d4f4;
    --pickup-bg: #faeeda;
    --pickup-text: #633806;
    --pickup-border: #fac775;
    --club-bg: #f3eafe;
    --club-text: #3c3489;
    --club-border: #afa9ec;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252523;
      --bg3: #2e2e2b;
      --text: #f0efe9;
      --text2: #a0a09a;
      --text3: #6b6b67;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --her-bg: #085041;
      --her-text: #9fe1cb;
      --her-border: #0f6e56;
      --him-bg: #0c447c;
      --him-text: #b5d4f4;
      --him-border: #185fa5;
      --pickup-bg: #633806;
      --pickup-text: #fac775;
      --pickup-border: #854f0b;
      --club-bg: #3c3489;
      --club-text: #afa9ec;
      --club-border: #534ab7;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }

  .container { max-width: 680px; margin: 0 auto; }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 0.25rem;
    color: var(--text);
  }

  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    gap: 12px;
    flex-wrap: wrap;
  }

  .edit-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--text2);
  }

  .edit-pill span { font-weight: 500; color: var(--text); }

  button {
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    padding: 7px 14px;
    transition: background 0.1s, opacity 0.1s;
  }

  button:hover { background: var(--bg2); }
  button:active { opacity: 0.7; }

  .btn-primary {
    background: var(--text);
    color: var(--bg);
    border-color: transparent;
  }

  .btn-primary:hover { opacity: 0.85; background: var(--text); }

  .btn-danger {
    color: #a32d2d;
    border-color: rgba(163,45,45,0.3);
    background: transparent;
  }

  .btn-danger:hover { background: #fcebeb; }

  /* PIN panel */
  .pin-panel {
    display: none;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .pin-panel.open { display: flex; }

  .pin-panel input[type="password"] {
    font-size: 14px;
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    width: 140px;
    font-family: inherit;
  }

  .pin-err { font-size: 12px; color: #a32d2d; width: 100%; display: none; }

  /* Legend */
  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .leg-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
  }

  .leg-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* Nav */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .cal-nav-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .nav-btn {
    padding: 6px 12px;
    font-size: 16px;
  }

  /* Calendar grid */
  .day-labels {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 3px;
  }

  .day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text3);
    text-transform: uppercase;
    padding: 4px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .cell {
    min-height: 80px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border);
    background: var(--bg);
    padding: 6px;
    position: relative;
    transition: border-color 0.12s;
    overflow: hidden;
  }

  .cell.clickable { cursor: pointer; }
  .cell.clickable:hover { border-color: var(--border2); }
  .cell.empty { background: transparent; border-color: transparent; }

  .cell-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
  }

  .cell.today .cell-num {
    background: var(--text);
    color: var(--bg);
    border-radius: 50%;
    font-size: 11px;
  }

  .cell.has-her { background: var(--her-bg); border-color: var(--her-border); }
  .cell.has-him { background: var(--him-bg); border-color: var(--him-border); }
  .cell.has-pickup { background: var(--pickup-bg); border-color: var(--pickup-border); }

  .badges { display: flex; flex-direction: column; gap: 2px; }

  .badge {
    font-size: 10px;
    font-weight: 600;
    border-radius: 4px;
    padding: 2px 5px;
    line-height: 1.4;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge-her { background: var(--her-bg); color: var(--her-text); }
  .badge-him { background: var(--him-bg); color: var(--him-text); }
  .badge-pickup { background: var(--pickup-bg); color: var(--pickup-text); }
  .badge-club { background: var(--club-bg); color: var(--club-text); }

  .cell-note {
    font-size: 9px;
    color: var(--text3);
    margin-top: 2px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg);
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    padding: 1.5rem;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }

  .modal-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 1.25rem;
    color: var(--text);
  }

  .field { margin-bottom: 1rem; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    margin-bottom: 5px;
  }

  .field select,
  .field input[type="text"],
  .field input[type="time"],
  .field input[type="password"] {
    width: 100%;
    font-size: 14px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    font-family: inherit;
    appearance: auto;
  }

  .field select:focus,
  .field input:focus {
    outline: 2px solid rgba(0,0,0,0.2);
    outline-offset: 1px;
  }

  .clubs-section {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    background: var(--bg2);
  }

  .clubs-section label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    display: block;
    margin-bottom: 8px;
  }

  .club-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    align-items: center;
  }

  .club-row input[type="text"] {
    flex: 1;
    font-size: 13px;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
  }

  .club-row input[type="time"] {
    font-size: 13px;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
    width: 110px;
  }

  .club-remove {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 16px;
    padding: 0 4px;
    cursor: pointer;
    line-height: 1;
    border-radius: 4px;
  }

  .club-remove:hover { color: #a32d2d; background: #fcebeb; }

  .add-club-btn {
    font-size: 12px;
    padding: 5px 10px;
    margin-top: 4px;
    border-style: dashed;
    width: 100%;
    color: var(--text2);
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 1.5rem;
  }

  .modal-actions button { flex: 1; padding: 9px; }

  .dayview-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .dayview-row:last-child { border-bottom: none; }
  .dayview-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; margin-top: 1px; }
  .dayview-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 3px; }
  .dayview-value { font-size: 16px; font-weight: 500; color: var(--text); }
  .dayview-empty { text-align: center; padding: 2rem 0; color: var(--text3); font-size: 14px; }
  @media (max-width: 480px) {
    body { padding: 1rem 0.5rem 2rem; }
    .cell { min-height: 60px; padding: 4px; }
    .cell-num { font-size: 11px; width: 18px; height: 18px; }
    .badge { font-size: 9px; padding: 1px 4px; }
    h1 { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">

  <h1>📅 Schedule</h1>
  <p class="subtitle">Tap a day to see details. Edit mode is PIN-protected.</p>

  <div class="topbar">
    <div class="edit-pill">
      <span id="mode-label">View mode</span>
    </div>
    <span id="sync-status" style="font-size:12px; color:var(--text3); margin-right:auto; padding-left:8px;"></span>
    <button id="edit-btn" onclick="togglePin()">🔒 Edit</button>
  </div>

  <div class="pin-panel" id="pin-panel">
    <input type="password" id="pin-input" placeholder="Enter PIN" maxlength="10" onkeydown="if(event.key==='Enter')checkPin()" />
    <button onclick="checkPin()">Unlock</button>
    <button onclick="cancelPin()">Cancel</button>
    <div class="pin-err" id="pin-err">Incorrect PIN</div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--her-bg);border:1px solid var(--her-border)"></div> Ivana</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--him-bg);border:1px solid var(--him-border)"></div> With Alex</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--pickup-bg);border:1px solid var(--pickup-border)"></div> Alex pickup</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--club-bg);border:1px solid var(--club-border)"></div> Club</div>
  </div>

  <div class="cal-nav">
    <button class="nav-btn" onclick="prevMonth()">&#8592;</button>
    <div class="cal-nav-title" id="cal-title"></div>
    <button class="nav-btn" onclick="nextMonth()">&#8594;</button>
  </div>

  <div class="day-labels">
    <div class="day-label">Mon</div>
    <div class="day-label">Tue</div>
    <div class="day-label">Wed</div>
    <div class="day-label">Thu</div>
    <div class="day-label">Fri</div>
    <div class="day-label">Sat</div>
    <div class="day-label">Sun</div>
  </div>

  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- Day view popup (read-only, for all users) -->
<div class="modal-overlay" id="dayview-overlay" onclick="closeDayView(event)">
  <div class="modal" style="max-width:360px">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem">
      <div class="modal-title" id="dayview-date" style="margin-bottom:0"></div>
      <button onclick="closeDayView()" style="padding:4px 10px; font-size:18px; border:none; background:none; color:var(--text2)">×</button>
    </div>
    <div id="dayview-content"></div>
  </div>
</div>
  <div class="modal">
    <div class="modal-title" id="modal-date"></div>

    <div class="field">
      <label>Who's day is it?</label>
      <select id="ev-type">
        <option value="">— not set —</option>
        <option value="her">Ivana</option>
        <option value="him">With Alex</option>
      </select>
    </div>

    <div class="field" id="pickup-row" style="display:none">
      <label>Alex pickup?</label>
      <select id="ev-pickup">
        <option value="">No pickup</option>
        <option value="yes">Yes — set time</option>
      </select>
    </div>

    <div class="field" id="pickup-time-row" style="display:none">
      <label>Pickup time</label>
      <input type="time" id="ev-pickup-time" value="15:30" />
    </div>

    <div class="field">
      <label>Note (optional)</label>
      <input type="text" id="ev-note" placeholder="e.g. school gates, early finish…" maxlength="60" />
    </div>

    <div class="field">
      <div class="clubs-section">
        <label>Clubs / activities</label>
        <div id="clubs-list"></div>
        <button class="add-club-btn" onclick="addClubRow()">+ Add club</button>
      </div>
    </div>

    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-danger" id="del-btn" onclick="deleteEvent()" style="display:none">Clear</button>
      <button class="btn-primary" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<script>
const PIN = "1234";
const BIN_ID = "6a062b3aadc21f119a9f1556";
const API_KEY = "$2a$10$tbGxPycg9hxS8/XmdNwKNen7V3iKXtMjItSiKgG7hMEUuBR1/hhwC";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

let editMode = false;
let pinUnlocked = false;
let currentYear, currentMonth;
let events = {};
let selectedKey = null;

function setStatus(msg, isError) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.style.color = isError ? '#a32d2d' : 'var(--text3)';
}

function init() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  loadEvents();
}
function dayKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

async function loadEvents() {
  setStatus('Loading…');
  try {
    const res = await fetch(BIN_URL + '/latest', {
      headers: { 'X-Master-Key': API_KEY }
    });
    const data = await res.json();
    const record = data.record || {};
    delete record.init;
    events = record;
    setStatus('');
  } catch(e) {
    setStatus('Could not load data', true);
    events = {};
  }
  render();
}

async function saveEvents() {
  setStatus('Saving…');
  try {
    const res = await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body: JSON.stringify(events)
    });
    if (!res.ok) throw new Error('Failed');
    setStatus('Saved ✓');
    setTimeout(() => setStatus(''), 2000);
  } catch(e) {
    setStatus('Save failed', true);
  }
}

function prevMonth() { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} render(); }
function nextMonth() { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} render(); }

function togglePin() {
  if (pinUnlocked) {
    pinUnlocked = false; editMode = false;
    document.getElementById('pin-panel').classList.remove('open');
    document.getElementById('mode-label').textContent = 'View mode';
    document.getElementById('edit-btn').textContent = '🔒 Edit';
    render();
  } else {
    document.getElementById('pin-panel').classList.add('open');
    document.getElementById('pin-input').focus();
  }
}

function cancelPin() {
  document.getElementById('pin-panel').classList.remove('open');
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-err').style.display = 'none';
}

function checkPin() {
  if (document.getElementById('pin-input').value === PIN) {
    pinUnlocked = true; editMode = true;
    document.getElementById('pin-panel').classList.remove('open');
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-err').style.display = 'none';
    document.getElementById('mode-label').textContent = 'Edit mode — tap a day to edit';
    document.getElementById('edit-btn').textContent = '🔓 Lock';
    render();
  } else {
    document.getElementById('pin-err').style.display = 'block';
  }
}

function render() {
  document.getElementById('cal-title').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const now = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();

  for(let i=0; i<offset; i++) {
    const blank = document.createElement('div');
    blank.className = 'cell empty';
    grid.appendChild(blank);
  }

  for(let d=1; d<=daysInMonth; d++) {
    const k = dayKey(currentYear, currentMonth, d);
    const ev = events[k] || {};
    const isToday = d===now.getDate() && currentMonth===now.getMonth() && currentYear===now.getFullYear();

    const cell = document.createElement('div');
    let cls = 'cell';
    if(editMode) cls += ' clickable';
    if(isToday) cls += ' today';
    if(ev.type === 'her') cls += ' has-her';
    else if(ev.type === 'him') cls += ' has-him';
    if(ev.pickup === 'yes') cls += ' has-pickup';
    cell.className = cls;

    const num = document.createElement('div');
    num.className = 'cell-num';
    num.textContent = d;
    cell.appendChild(num);

    const badges = document.createElement('div');
    badges.className = 'badges';

    if(ev.type === 'her') {
      const b = document.createElement('span');
      b.className = 'badge badge-her';
      b.textContent = 'Ivana';
      badges.appendChild(b);
    } else if(ev.type === 'him') {
      const b = document.createElement('span');
      b.className = 'badge badge-him';
      b.textContent = 'Alex';
      badges.appendChild(b);
    }

    if(ev.pickup === 'yes') {
      const b = document.createElement('span');
      b.className = 'badge badge-pickup';
      b.textContent = ev.pickupTime ? `Pickup ${ev.pickupTime}` : 'Pickup';
      badges.appendChild(b);
    }

    if(ev.clubs && ev.clubs.length > 0) {
      ev.clubs.forEach(c => {
        if(c.name) {
          const b = document.createElement('span');
          b.className = 'badge badge-club';
          b.textContent = c.time ? `${c.name} ${c.time}` : c.name;
          badges.appendChild(b);
        }
      });
    }

    cell.appendChild(badges);

    if(ev.note) {
      const n = document.createElement('div');
      n.className = 'cell-note';
      n.textContent = ev.note;
      cell.appendChild(n);
    }

    if(editMode) {
      cell.classList.add('clickable');
      cell.onclick = () => openModal(k, d);
    } else if(ev.type || ev.pickup === 'yes' || (ev.clubs && ev.clubs.length > 0) || ev.note) {
      cell.classList.add('clickable');
      cell.onclick = () => openDayView(k, d);
    }
    grid.appendChild(cell);
  }
}

function openDayView(k, d) {
  const ev = events[k] || {};
  const overlay = document.getElementById('dayview-overlay');
  document.getElementById('dayview-date').textContent = `${d} ${MONTHS[currentMonth]} ${currentYear}`;

  const content = document.getElementById('dayview-content');
  content.innerHTML = '';

  const rows = [];

  if(ev.type) {
    rows.push({ icon: ev.type === 'her' ? '👩' : '👨', label: 'With', value: ev.type === 'her' ? 'Ivana' : 'Alex' });
  }

  if(ev.pickup === 'yes') {
    rows.push({ icon: '🚗', label: 'Alex pickup', value: ev.pickupTime ? `at ${ev.pickupTime}` : 'Yes' });
  }

  if(ev.clubs && ev.clubs.length > 0) {
    ev.clubs.forEach(c => {
      if(c.name) rows.push({ icon: '🎯', label: 'Club', value: c.time ? `${c.name} at ${c.time}` : c.name });
    });
  }

  if(ev.note) {
    rows.push({ icon: '📝', label: 'Note', value: ev.note });
  }

  if(rows.length === 0) {
    content.innerHTML = '<div class="dayview-empty">Nothing scheduled</div>';
  } else {
    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'dayview-row';
      row.innerHTML = `
        <div class="dayview-icon">${r.icon}</div>
        <div>
          <div class="dayview-label">${r.label}</div>
          <div class="dayview-value">${r.value}</div>
        </div>`;
      content.appendChild(row);
    });
  }

  overlay.classList.add('open');
}

function closeDayView(e) {
  if(!e || e.target === document.getElementById('dayview-overlay') || e.target.tagName === 'BUTTON') {
    document.getElementById('dayview-overlay').classList.remove('open');
  }
}
  selectedKey = k;
  const ev = events[k] || {};
  document.getElementById('modal-date').textContent = `${d} ${MONTHS[currentMonth]} ${currentYear}`;
  document.getElementById('ev-type').value = ev.type || '';
  document.getElementById('ev-pickup').value = ev.pickup || '';
  document.getElementById('ev-pickup-time').value = ev.pickupTime || '15:30';
  document.getElementById('ev-note').value = ev.note || '';
  document.getElementById('del-btn').style.display = ev.type || ev.clubs?.length ? 'block' : 'none';

  togglePickupRow();
  togglePickupTimeRow();

  const clubsList = document.getElementById('clubs-list');
  clubsList.innerHTML = '';
  if(ev.clubs && ev.clubs.length > 0) {
    ev.clubs.forEach(c => addClubRow(c.name, c.time));
  }

  document.getElementById('modal-overlay').classList.add('open');
}

function overlayClick(e) { if(e.target === document.getElementById('modal-overlay')) closeModal(); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); selectedKey = null; }

document.getElementById('ev-type').addEventListener('change', togglePickupRow);
document.getElementById('ev-pickup').addEventListener('change', togglePickupTimeRow);

function togglePickupRow() {
  const t = document.getElementById('ev-type').value;
  document.getElementById('pickup-row').style.display = t ? 'block' : 'none';
  if(!t) {
    document.getElementById('ev-pickup').value = '';
    document.getElementById('pickup-time-row').style.display = 'none';
  }
}

function togglePickupTimeRow() {
  const p = document.getElementById('ev-pickup').value;
  document.getElementById('pickup-time-row').style.display = p === 'yes' ? 'block' : 'none';
}

function addClubRow(name='', time='') {
  const row = document.createElement('div');
  row.className = 'club-row';
  row.innerHTML = `
    <input type="text" placeholder="Club name e.g. Swimming" value="${name}" maxlength="30" />
    <input type="time" value="${time}" />
    <button class="club-remove" onclick="this.parentElement.remove()" title="Remove">×</button>
  `;
  document.getElementById('clubs-list').appendChild(row);
}

function getClubs() {
  const rows = document.querySelectorAll('#clubs-list .club-row');
  const clubs = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const name = inputs[0].value.trim();
    const time = inputs[1].value;
    if(name) clubs.push({ name, time });
  });
  return clubs;
}

async function saveEvent() {
  if(!selectedKey) return;
  const type = document.getElementById('ev-type').value;
  const pickup = document.getElementById('ev-pickup').value;
  const pickupTime = pickup === 'yes' ? document.getElementById('ev-pickup-time').value : '';
  const note = document.getElementById('ev-note').value.trim();
  const clubs = getClubs();

  if(!type && !clubs.length && !note) {
    delete events[selectedKey];
  } else {
    events[selectedKey] = { type, pickup, pickupTime, note, clubs };
  }

  closeModal();
  render();
  await saveEvents();
}

async function deleteEvent() {
  if(!selectedKey) return;
  delete events[selectedKey];
  closeModal();
  render();
  await saveEvents();
}

init();
</script>
</body>
</html>
